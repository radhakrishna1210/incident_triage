<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Incident Triage — Health</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; margin: 0; background: #020617; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #0f172a; border: 1px solid #334155; border-radius: 14px; padding: 40px 48px; text-align: center; min-width: 320px; }
    .dot { width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .dot.healthy { background: #14532d; box-shadow: 0 0 24px #22c55e55; }
    .dot.unhealthy { background: #450a0a; box-shadow: 0 0 24px #ef444455; }
    .dot.checking { background: #1e293b; }
    h1 { margin: 0 0 6px; font-size: 1.5rem; }
    .status-text { font-size: 1.1rem; font-weight: 700; margin: 8px 0 4px; }
    .healthy-text { color: #4ade80; }
    .unhealthy-text { color: #f87171; }
    .muted { color: #64748b; font-size: 13px; }
    .refresh-info { margin-top: 20px; color: #475569; font-size: 12px; }
    .last-check { margin-top: 4px; font-size: 12px; color: #64748b; }
    .raw { margin-top: 16px; background: #020617; border: 1px solid #1e293b; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 12px; color: #94a3b8; text-align: left; }
  </style>
</head>
<body>
  <div class="card">
    <div class="dot checking" id="dot">⏳</div>
    <h1>Server Health</h1>
    <div class="status-text muted" id="statusText">Checking...</div>
    <div class="raw" id="raw">—</div>
    <div class="last-check" id="lastCheck"></div>
    <div class="refresh-info">Auto-refreshes every 5 seconds</div>
  </div>

  <script>
    async function check() {
      const dot = document.getElementById("dot");
      const statusText = document.getElementById("statusText");
      const raw = document.getElementById("raw");
      const lastCheck = document.getElementById("lastCheck");
      try {
        const res = await fetch(window.location.origin + "/health");
        const data = await res.json();
        const isOk = res.ok && (data.status === "healthy" || data.status === "ok");
        dot.className = "dot " + (isOk ? "healthy" : "unhealthy");
        dot.textContent = isOk ? "✓" : "✗";
        statusText.className = "status-text " + (isOk ? "healthy-text" : "unhealthy-text");
        statusText.textContent = isOk ? "Healthy" : "Unhealthy";
        raw.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        dot.className = "dot unhealthy";
        dot.textContent = "✗";
        statusText.className = "status-text unhealthy-text";
        statusText.textContent = "Unreachable";
        raw.textContent = err.message;
      }
      lastCheck.textContent = "Last checked: " + new Date().toLocaleTimeString();
    }

    check();
    setInterval(check, 5000);
  </script>
</body>
</html>
