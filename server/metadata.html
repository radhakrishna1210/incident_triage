<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Incident Triage — Metadata</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; margin: 0; background: #020617; color: #e2e8f0; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 28px 20px; }
    h1 { margin: 0 0 4px; font-size: 1.6rem; }
    .muted { color: #94a3b8; font-size: 13px; }
    .card { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 20px 24px; margin-top: 20px; }
    .row { display: flex; gap: 16px; padding: 10px 0; border-bottom: 1px solid #1e293b; align-items: baseline; }
    .row:last-child { border-bottom: none; }
    .label { color: #64748b; font-size: 12px; font-family: monospace; min-width: 120px; flex-shrink: 0; }
    .value { font-size: 14px; color: #f1f5f9; word-break: break-word; }
    .value a { color: #60a5fa; }
    .readme-wrap { margin-top: 24px; }
    .readme-wrap h2 { font-size: 1.1rem; color: #94a3b8; margin: 0 0 10px; }
    .readme { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 20px 24px;
              font-size: 13px; line-height: 1.7; color: #cbd5e1; white-space: pre-wrap; font-family: monospace;
              max-height: 480px; overflow-y: auto; }
    #error { color: #f87171; margin-top: 12px; font-size: 13px; display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Environment Metadata</h1>
    <p class="muted">Information about this OpenEnv environment.</p>
    <p id="error"></p>

    <div class="card" id="metaCard" style="display:none">
      <div class="row"><span class="label">name</span><span class="value" id="mName">—</span></div>
      <div class="row"><span class="label">version</span><span class="value" id="mVersion">—</span></div>
      <div class="row"><span class="label">author</span><span class="value" id="mAuthor">—</span></div>
      <div class="row"><span class="label">description</span><span class="value" id="mDesc">—</span></div>
      <div class="row"><span class="label">docs</span><span class="value" id="mDocs">—</span></div>
    </div>

    <div class="readme-wrap" id="readmeWrap" style="display:none">
      <h2>README</h2>
      <div class="readme" id="readme"></div>
    </div>
  </div>

  <script>
    async function load() {
      const errEl = document.getElementById("error");
      try {
        const res = await fetch(window.location.origin + "/metadata");
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();

        document.getElementById("mName").textContent    = data.name    || "—";
        document.getElementById("mVersion").textContent = data.version || "—";
        document.getElementById("mAuthor").textContent  = data.author  || "—";
        document.getElementById("mDesc").textContent    = data.description || "—";

        const docsEl = document.getElementById("mDocs");
        if (data.documentation_url) {
          docsEl.innerHTML = `<a href="${data.documentation_url}" target="_blank">${data.documentation_url}</a>`;
        } else {
          docsEl.textContent = "—";
        }

        document.getElementById("metaCard").style.display = "";

        if (data.readme_content) {
          // Strip YAML frontmatter block if present
          const content = data.readme_content.replace(/^---[\s\S]*?---\n/, "").trim();
          document.getElementById("readme").textContent = content;
          document.getElementById("readmeWrap").style.display = "";
        }

        errEl.style.display = "none";
      } catch (err) {
        errEl.style.display = "";
        errEl.textContent = "Failed to load metadata: " + err.message;
      }
    }

    load();
  </script>
</body>
</html>
